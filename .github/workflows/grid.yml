name: Generate Contribution Grid Text

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate SVG (Pixel Text)
        run: |
          mkdir -p dist
          cat << 'EOF' > dist/grid.svg
          <svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
            <style>
              .cell {
                width: 10px;
                height: 10px;
                fill: #39d353;
              }

              .word {
                opacity: 0;
                animation: fade 9s infinite;
              }

              .word:nth-child(1) { animation-delay: 0s; }
              .word:nth-child(2) { animation-delay: 3s; }
              .word:nth-child(3) { animation-delay: 6s; }

              @keyframes fade {
                0% { opacity: 0; }
                10% { opacity: 1; }
                30% { opacity: 1; }
                40% { opacity: 0; }
                100% { opacity: 0; }
              }
            </style>

            <!-- KRITIKA -->
            <g class="word">
              <!-- K -->
              <rect x="10" y="20" width="10" height="10" class="cell"/>
              <rect x="10" y="30" width="10" height="10" class="cell"/>
              <rect x="10" y="40" width="10" height="10" class="cell"/>
              <rect x="20" y="30" width="10" height="10" class="cell"/>
              <rect x="30" y="20" width="10" height="10" class="cell"/>
              <rect x="20" y="40" width="10" height="10" class="cell"/>
              <rect x="30" y="50" width="10" height="10" class="cell"/>

              <!-- R -->
              <rect x="50" y="20" width="10" height="10" class="cell"/>
              <rect x="50" y="30" width="10" height="10" class="cell"/>
              <rect x="50" y="40" width="10" height="10" class="cell"/>
              <rect x="60" y="20" width="10" height="10" class="cell"/>
              <rect x="60" y="30" width="10" height="10" class="cell"/>
              <rect x="60" y="40" width="10" height="10" class="cell"/>
              <rect x="70" y="30" width="10" height="10" class="cell"/>
            </g>

            <!-- FULLSTACK -->
            <g class="word">
              <rect x="10" y="20" width="10" height="10" class="cell"/>
              <rect x="20" y="20" width="10" height="10" class="cell"/>
              <rect x="30" y="20" width="10" height="10" class="cell"/>
              <rect x="40" y="20" width="10" height="10" class="cell"/>
              <rect x="50" y="20" width="10" height="10" class="cell"/>
              <rect x="60" y="20" width="10" height="10" class="cell"/>
              <rect x="70" y="20" width="10" height="10" class="cell"/>
              <rect x="80" y="20" width="10" height="10" class="cell"/>
            </g>

            <!-- MERN -->
            <g class="word">
              <rect x="10" y="20" width="10" height="10" class="cell"/>
              <rect x="20" y="30" width="10" height="10" class="cell"/>
              <rect x="30" y="40" width="10" height="10" class="cell"/>
              <rect x="40" y="30" width="10" height="10" class="cell"/>
              <rect x="50" y="20" width="10" height="10" class="cell"/>
              <rect x="60" y="30" width="10" height="10" class="cell"/>
            </g>

          </svg>
          EOF

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output