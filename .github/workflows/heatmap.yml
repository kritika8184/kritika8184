name: Generate Heatmap Text

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Grid SVG
        run: |
          mkdir -p dist
          cat << 'EOF' > dist/grid.svg
          <svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
            <style>
              .cell {
                width: 12px;
                height: 12px;
                fill: #39d353;
                opacity: 0;
                animation: fade 6s infinite;
              }

              @keyframes fade {
                0% { opacity: 0; }
                20% { opacity: 1; }
                80% { opacity: 1; }
                100% { opacity: 0; }
              }
            </style>

            <!-- KRITIKA -->
            <g>
              <rect x="10" y="20" class="cell"/>
              <rect x="25" y="20" class="cell"/>
              <rect x="40" y="20" class="cell"/>
              <rect x="55" y="20" class="cell"/>
              <rect x="70" y="20" class="cell"/>
            </g>

            <!-- FULLSTACK -->
            <g>
              <rect x="10" y="60" class="cell" style="animation-delay:2s"/>
              <rect x="25" y="60" class="cell" style="animation-delay:2s"/>
              <rect x="40" y="60" class="cell" style="animation-delay:2s"/>
              <rect x="55" y="60" class="cell" style="animation-delay:2s"/>
              <rect x="70" y="60" class="cell" style="animation-delay:2s"/>
            </g>

            <!-- MERN -->
            <g>
              <rect x="10" y="100" class="cell" style="animation-delay:4s"/>
              <rect x="25" y="100" class="cell" style="animation-delay:4s"/>
              <rect x="40" y="100" class="cell" style="animation-delay:4s"/>
              <rect x="55" y="100" class="cell" style="animation-delay:4s"/>
            </g>

          </svg>
          EOF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}